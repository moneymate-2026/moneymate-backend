
services:
  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
      target: dev # <--- Uses the Air development stage
    volumes:
      - ./:/moneymate-backend

    working_dir: /moneymate-backend/services/gateway
    environment:
      - CONFIG_PATH=/moneymate-backend/shared/config/config.yaml
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
      target: dev # <--- Uses the Air development stage
    volumes:
     - ./:/moneymate-backend
    working_dir: /moneymate-backend/services/auth
    environment:
      - CONFIG_PATH=/moneymate-backend/shared/config/config.yaml
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine # 16 is the current stable alpine version
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine # 7 is the current stable alpine version
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
