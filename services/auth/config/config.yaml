server:
  http_addr: "8081"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

database:
  max_open_conns: 25
  min_open_conns: 5
  max_conn_lifetime: 15m
  max_idle_time: 5m
  migrations_path: "services/auth/migrations"

redis:
  token_ttl: 60s
  pin_lockout_ttl: 15m

otp:
  ttl: 5m
  length: 6
  resend_cooldown: 60s
  max_verify_attempts: 5
  email_verified_ttl: 15m

jwt:
  access_expiry_minutes: 15
  refresh_expiry_hours: 720

smtp:
  host: "smtp.resend.com"   
  port: 587
  from_address: "noreply@moneymate.app"
  from_name: "MoneyMate"

argon2:
  memory: 65536
  iterations: 3
  threads: 4
  key_length: 32

log:
  level: info