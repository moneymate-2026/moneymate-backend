services:
  # ── Microservices (Forced to 'web' for Free Tier) ──
  - type: web
    name: auth-service
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./services/auth/Dockerfile
    envVars:
      - key: AUTH_DB_URL
        value: postgresql://superuser:41tRCqFMbMCgPwg2K3gB64JECN1Q9ih8@dpg-d9hk7pl8nd3s73d7cji0-a/moneymate_ld80

  - type: web
    name: merchant-service
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./services/merchant/Dockerfile
    envVars:
      - key: MERCHANT_DB_URL
        value: postgresql://superuser:41tRCqFMbMCgPwg2K3gB64JECN1Q9ih8@dpg-d9hk7pl8nd3s73d7cji0-a/moneymate_ld80

  # ── Public API Gateway ──
  - type: web
    name: api-gateway
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./services/gateway/Dockerfile
    envVars:
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8081
      - key: MERCHANT_SERVICE_URL
        value: http://merchant-service:50053